teacher_model: "gemini-2.5-flash" # Gemini API teacher
dashscope_model: "qwen3.5-flash"  # Alibaba Cloud DashScope teacher

prompt_template: |
  Ban la mot chuyen gia AI logic. Hay suy nghi tung buoc va dua ra cau tra loi cuoi cung.
  
  Cau hoi: {question}
  
  Qua trinh suy nghi (Reasoning Steps):
  <think>
  ...
  </think>
  
  Cau tra loi cuoi cung:
  ...

num_samples: 1000 # Number of CoT samples to generate
output_file: "data/cot_dataset.jsonl"
